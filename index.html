<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Berkshire Hathaway Inc.", "ImmunityBio, Inc.", "GE Vernova Inc.", "The Coca-Cola Company", "Lockheed Martin Corporation", "Rocket Lab Corporation", "Costco Wholesale Corporation", "Energy Transfer LP", "The Boeing Company", "The Walt Disney Company", "Adobe Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-1.43, NaN, -2.29, 1.37, -1.83, -7.6, 0.43, 1.18, -1.98, -2.46, -2.51],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
