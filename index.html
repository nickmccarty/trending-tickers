<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["QUALCOMM Incorporated", "Trump Media \u0026 Technology Group Corp.", "International Business Machines Corporation", "The Coca-Cola Company", "Apple Inc.", "Petr\u00f3leo Brasileiro S.A. - Petrobras", "Chevron Corporation", "The Trade Desk, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-0.96, -5.21, 0.9, 0.01, -1.09, 5.2, 0.02, -1.71],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
