<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Lockheed Martin Corporation", "Trump Media \u0026 Technology Group Corp.", "Berkshire Hathaway Inc.", "Vertiv Holdings Co", "The Coca-Cola Company", "The Walt Disney Company", "Strategy Inc", "Vistra Corp.", "Ondas Inc.", "Visa Inc.", "NIKE, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-3.08, 1.96, -0.26, 0.53, 0.46, -1.01, -0.84, 4.78, 0.09, 0.17, -0.2],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
