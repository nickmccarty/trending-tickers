<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Virgin Galactic Holdings, Inc.", "Marvell Technology, Inc.", "Rocket Lab Corporation", "AST SpaceMobile, Inc.", "Planet Labs PBC", "IREN Limited", "Alphabet Inc.", "Apple Inc."],
                datasets: [{
                    label: '% Change',
                    data: [2.5, 0.37, 3.37, 10.28, 16.83, 1.99, -0.54, 0.11],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
