<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Saudi Arabian Oil Company", "Chevron Corporation", "Exxon Mobil Corporation", "ConocoPhillips", "Occidental Petroleum Corporation", "ASML Holding N.V.", "NIO Inc.", "Berkshire Hathaway Inc."],
                datasets: [{
                    label: '% Change',
                    data: [3.37, 1.41, 2.67, 2.49, 3.21, -0.9, -4.32, 0.45],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
