<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["IREN Limited", "Applied Optoelectronics, Inc.", "Rivian Automotive, Inc.", "Visa Inc.", "ServiceNow, Inc.", "Navitas Semiconductor Corporation", "Pfizer Inc."],
                datasets: [{
                    label: '% Change',
                    data: [0.88, 1.33, 2.01, 0.61, 0.23, -0.4, 1.25],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
