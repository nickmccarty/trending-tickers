<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Berkshire Hathaway Inc.", "ASML Holding N.V.", "Apple Inc.", "Broadcom Inc.", "Alphabet Inc.", "Microsoft Corporation", "Alphabet Inc.", "SoFi Technologies, Inc.", "Taiwan Semiconductor Manufacturing Company Limited", "Exxon Mobil Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [-0.24, -3.13, 0.11, 0.34, -0.15, 1.11, -0.54, 1.41, -0.72, -0.06],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
