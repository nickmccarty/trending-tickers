<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Aditxt, Inc.", "IonQ, Inc.", "Nebius Group N.V.", "Ondas Inc.", "Wolfspeed, Inc.", "Vertiv Holdings Co", "Applied Materials, Inc.", "Applied Optoelectronics, Inc.", "Coherent Corp.", "Navitas Semiconductor Corporation", "Lam Research Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [127.27, 3.4, 2.06, 1.64, 17.91, 4.87, 4.08, -3.28, 2.83, 7.52, 3.97],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
