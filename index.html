<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Federal National Mortgage Association", "One Stop Systems, Inc.", "AeroVironment, Inc.", "Honeywell International Inc.", "Cameco Corporation", "Kratos Defense \u0026 Security Solutions, Inc.", "Strategy Inc"],
                datasets: [{
                    label: '% Change',
                    data: [14.47, -14.12, -6.45, -3.29, -4.74, -8.79, -1.85],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
