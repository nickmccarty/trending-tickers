<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>

    <script>

            type: 'bar',
            data: {
                labels: ["3M Company", "The Walt Disney Company", "United Parcel Service, Inc.", "Trump Media \u0026 Technology Group Corp.", "Lockheed Martin Corporation", "The Coca-Cola Company", "AT\u0026T Inc.", "The Trade Desk, Inc.", "Berkshire Hathaway Inc.", "RTX Corporation", "Salesforce, Inc.", "Realty Income Corporation", "Visa Inc.", "ServiceNow, Inc.", "The Boeing Company"],
                datasets: [{
                    label: '% Change',
                    data: [-0.54, 0.05, 0.28, 1.32, 0.83, 0.84, 0.07, 0.32, -0.24, 0.77, 0.5, 0.53, 0.77, -1.96, 0.43],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
