<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Sea Limited", "Sivers Semiconductors AB (publ)", "Tema Space Innovators ETF", "Velo3D, Inc.", "Sivers Semiconductors AB (publ)", "Berkshire Hathaway Inc.", "Coherent Corp.", "NuScale Power Corporation", "Applied Materials, Inc.", "Constellation Energy Corporation", "Lam Research Corporation", "Planet Labs PBC"],
                datasets: [{
                    label: '% Change',
                    data: [-1.9, 17.78, 6.13, 13.43, 23.45, 1.33, -0.11, 0.62, 1.12, 2.88, 1.03, 4.4],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
