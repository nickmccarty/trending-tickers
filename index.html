<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Berkshire Hathaway Inc.", "Berkshire Hathaway Inc.", "Amkor Technology, Inc.", "JPMorgan Chase \u0026 Co.", "NIKE, Inc.", "Adobe Inc.", "Oklo Inc.", "Applied Optoelectronics, Inc.", "The Coca-Cola Company", "Caterpillar Inc.", "Vertiv Holdings Co", "NuScale Power Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [-0.12, NaN, 1.92, -0.24, 0.09, 1.87, -2.9, 11.65, -0.23, -0.05, -0.05, -2.57],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
