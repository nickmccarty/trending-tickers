<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["AeroVironment, Inc.", "Federal National Mortgage Association", "Cameco Corporation", "Kratos Defense \u0026 Security Solutions, Inc.", "Ondas Inc.", "Ford Motor Company", "Rivian Automotive, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-6.45, 14.47, -4.74, -8.79, -6.15, -1.03, -7.51],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
