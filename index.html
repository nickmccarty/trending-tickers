<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Saudi Arabian Oil Company", "QUALCOMM Incorporated", "Oracle Corporation", "Intel Corporation", "Petr\u00f3leo Brasileiro S.A. - Petrobras", "Chevron Corporation", "Amprius Technologies, Inc.", "Adobe Inc.", "Apple Inc."],
                datasets: [{
                    label: '% Change',
                    data: [4.1, -0.96, -1.18, -5.51, 5.2, 0.02, 9.67, 0.67, -1.09],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
