<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["STMicroelectronics N.V.", "Celsius Holdings, Inc.", "Pfizer Inc.", "AXT, Inc.", "Vertiv Holdings Co", "GE Vernova Inc.", "The Boeing Company", "SoundHound AI, Inc.", "Salesforce, Inc.", "Walmart Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-9.75, 1.37, 1.36, -15.99, -7.23, -3.09, -0.91, -7.74, -1.64, 0.97],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
