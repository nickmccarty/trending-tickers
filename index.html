<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Digital Realty Trust, Inc.", "Palo Alto Networks, Inc.", "Trump Media \u0026 Technology Group Corp.", "Devon Energy Corporation", "Exxon Mobil Corporation", "Fair Isaac Corporation", "Rigetti Computing, Inc.", "Venture Global, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [0.38, -6.74, 1.4, -0.19, -1.63, -13.99, 2.59, -0.15],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
