<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Space Exploration Technologies Corp. Class A Common Stock", "Roku, Inc.", "FreeCast, Inc.", "Warner Bros. Discovery, Inc.", "Accenture plc", "Berkshire Hathaway Inc.", "Realty Income Corporation", "The Coca-Cola Company", "AT\u0026T Inc.", "Rivian Automotive, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [19.22, 20.08, 140.68, 0.45, 1.65, 0.71, 1.31, 0.11, 2.52, 7.85],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
