<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Visa Inc.", "Navitas Semiconductor Corporation", "ServiceNow, Inc.", "Vertiv Holdings Co", "Applied Optoelectronics, Inc.", "NuScale Power Corporation", "ASML Holding N.V.", "Lumentum Holdings Inc.", "Exxon Mobil Corporation", "Oracle Corporation", "Sandisk Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [0.61, -0.4, 0.23, 4.49, 1.33, 10.87, 3.47, 0.32, -3.65, -1.84, 0.17],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
