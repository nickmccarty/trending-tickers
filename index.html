<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["STMicroelectronics N.V.", "Pfizer Inc.", "Cerebras Systems Inc.", "Celsius Holdings, Inc.", "NIKE, Inc.", "NuScale Power Corporation", "Tema Space Innovators ETF", "BigBear.ai Holdings, Inc.", "Bloom Energy Corporation", "Constellation Energy Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [-9.75, 1.36, -6.68, 1.37, -1.47, -12.5, -9.48, -11.95, -9.53, -3.69],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
