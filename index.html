<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["General Mills, Inc.", "Delta Air Lines, Inc.", "The Coca-Cola Company", "Altria Group, Inc.", "MP Materials Corp.", "Costco Wholesale Corporation", "Verizon Communications Inc.", "NIKE, Inc.", "Destiny Tech100 Inc.", "Walmart Inc.", "Plug Power Inc."],
                datasets: [{
                    label: '% Change',
                    data: [1.19, -3.04, 1.37, 2.88, 0.19, 0.43, -0.85, -1.34, -6.0, 0.58, -3.11],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
