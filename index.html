<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Himax Technologies, Inc.", "The Coca-Cola Company", "Chevron Corporation", "Oracle Corporation", "Oklo Inc.", "AT\u0026T Inc.", "ExxonMobil Holdings Corporation", "Cisco Systems, Inc.", "GE Vernova Inc.", "Constellation Energy Corporation", "Bloom Energy Corporation", "Rocket Lab Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [-7.65, 3.51, 2.12, -1.56, -0.17, 0.49, 0.59, -3.69, -1.87, 1.16, -6.43, 0.39],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
