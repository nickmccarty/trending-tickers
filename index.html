<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Saudi Arabian Oil Company", "QUALCOMM Incorporated", "Petr\u00f3leo Brasileiro S.A. - Petrobras", "Apple Inc.", "NIO Inc.", "Adobe Inc.", "The Coca-Cola Company", "Red Cat Holdings, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [4.25, -0.96, 5.2, -1.09, 1.27, 0.67, 0.01, 1.86],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
