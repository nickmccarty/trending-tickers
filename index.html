<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Berkshire Hathaway Inc.", "Lockheed Martin Corporation", "Walmart Inc.", "NIKE, Inc.", "Lumentum Holdings Inc.", "GE Vernova Inc.", "Arista Networks, Inc.", "The Coca-Cola Company"],
                datasets: [{
                    label: '% Change',
                    data: [-0.26, -3.08, -1.6, -0.2, 4.1, -0.03, 2.53, 0.46],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
