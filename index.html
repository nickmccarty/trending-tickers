<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Applied Optoelectronics, Inc.", "Salesforce, Inc.", "PayPal Holdings, Inc.", "Eli Lilly and Company", "NIO Inc.", "Novo Nordisk A/S", "Lumentum Holdings Inc.", "QUALCOMM Incorporated", "Broadcom Inc.", "Micron Technology, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-12.99, 1.76, 3.18, 1.86, -3.62, 3.4, -9.09, -3.12, -2.41, -5.49],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
