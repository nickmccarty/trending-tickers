<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Roku, Inc.", "CleanSpark, Inc.", "Sivers Semiconductors AB (publ)", "NuScale Power Corporation", "Sivers Semiconductors AB (publ)", "Exxon Mobil Corporation", "Novo Nordisk A/S", "GE Aerospace", "The Boeing Company", "NIKE, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [0.38, 1.33, 17.78, 0.62, 23.45, -0.24, 1.28, 0.36, -0.27, 0.63],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
