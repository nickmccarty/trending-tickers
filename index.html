<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["SharonAI Holdings Inc.", "The Boeing Company", "GE Vernova Inc.", "Pfizer Inc.", "SK hynix Inc.", "NIKE, Inc.", "Ondas Inc.", "NIO Inc."],
                datasets: [{
                    label: '% Change',
                    data: [1.58, -0.4, -3.71, 2.62, NaN, -0.37, 2.02, 2.75],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
