<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Aditxt, Inc.", "SoFi Technologies, Inc.", "Vertiv Holdings Co", "Redwire Corporation", "NuScale Power Corporation", "Apple Inc.", "Cerebras Systems Inc.", "Applied Materials, Inc.", "Advanced Micro Devices, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [127.27, 2.81, 4.87, -0.07, 13.54, 0.7, 9.85, 4.08, 4.86],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
