<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["3M Company", "Trump Media \u0026 Technology Group Corp.", "Lockheed Martin Corporation", "The Walt Disney Company", "Ares Capital Corporation", "United Parcel Service, Inc.", "Johnson \u0026 Johnson", "Realty Income Corporation", "The Coca-Cola Company", "Enterprise Products Partners L.P.", "Berkshire Hathaway Inc.", "RTX Corporation", "Apple Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-0.54, 1.32, 0.83, 0.05, 2.03, 0.28, -0.44, 0.53, 0.84, 0.37, -0.24, 0.77, 0.11],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
