<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["The Coca-Cola Company", "Berkshire Hathaway Inc.", "Plug Power Inc.", "Visa Inc.", "The Boeing Company", "Lockheed Martin Corporation", "Circle Internet Group", "Occidental Petroleum Corporation", "General Mills, Inc.", "AST SpaceMobile, Inc.", "Palantir Technologies Inc.", "Costco Wholesale Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [1.37, -1.43, -3.11, -3.28, -1.98, -1.83, -4.69, 1.49, 1.19, -10.46, -3.05, 0.43],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
