<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Momentus Inc.", "Futu Holdings Limited", "DBS Group Holdings Ltd", "KIOXIA HOLDINGS CORPORATION", "Redwire Corporation", "Alibaba Group Holding Limited", "Dell Technologies Inc.", "Tema Space Innovators ETF", "BlackBerry Limited", "Planet Labs PBC", "Ford Motor Company"],
                datasets: [{
                    label: '% Change',
                    data: [-2.25, -27.53, 0.61, NaN, 13.94, 0.79, 16.77, 6.13, 18.95, 4.4, 9.22],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
