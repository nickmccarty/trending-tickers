<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Saudi Arabian Oil Company", "Trump Media \u0026 Technology Group Corp.", "QUALCOMM Incorporated", "The Coca-Cola Company", "Apple Inc.", "International Business Machines Corporation", "AeroVironment, Inc.", "Chevron Corporation", "Palo Alto Networks, Inc.", "Salesforce, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [4.25, -5.21, -0.96, 0.01, -1.09, 0.9, 4.19, 0.02, 1.16, 0.36],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
