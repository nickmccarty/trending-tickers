<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Tesla, Inc.", "Nuveen Municipal Credit Opportunities Fund", "SBA Communications Corporation", "Sidus Space, Inc.", "Nokia Oyj", "AbbVie Inc.", "AMC Entertainment Holdings, Inc.", "Enphase Energy, Inc.", "Energy Transfer LP", "RTX Corporation", "Cisco Systems, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-5.42, -0.28, 18.93, 47.14, 6.65, -2.86, 8.74, -8.78, -0.47, 0.77, 1.95],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
