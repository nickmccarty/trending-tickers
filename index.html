<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Saudi Arabian Oil Company", "Exxon Mobil Corporation", "Berkshire Hathaway Inc.", "Chevron Corporation", "NIO Inc.", "Palantir Technologies Inc.", "RTX Corporation", "Alibaba Group Holding Limited", "Occidental Petroleum Corporation", "Gold.com, Inc.", "Lockheed Martin Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [3.04, 2.67, 0.45, 1.41, -4.32, 0.92, 2.52, -2.66, 3.21, 1.93, 2.56],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
