<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Virgin Galactic Holdings, Inc.", "Planet Labs PBC", "Sidus Space, Inc.", "Lockheed Martin Corporation", "Uber Technologies, Inc.", "Palantir Technologies Inc.", "NIO Inc.", "BigBear.ai Holdings, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [2.5, 16.83, 47.14, 0.83, 0.18, 1.34, 1.61, 4.68],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
