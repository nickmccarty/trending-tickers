<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Interactive Brokers Group, Inc.", "Psyence Biomedical Ltd.", "Applied Materials, Inc.", "Oracle Corporation", "Rivian Automotive, Inc.", "ServiceNow, Inc.", "Visa Inc.", "NuScale Power Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [2.94, 29.47, 1.81, -1.84, 2.01, 0.23, 0.61, 10.87],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
