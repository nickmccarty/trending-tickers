<!DOCTYPE html>
<html>
<head>

                datasets: [{
                    label: '% Change',
                    data: [-1.63, 0.38, -0.75, 1.4, -0.95, -6.74, -3.03, -0.19, -0.96, -0.15, NaN, -0.39, 3.96],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1

            options: {
                scales: {

    </script>
</body>
</html>
