<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Trump Media \u0026 Technology Group Corp.", "Berkshire Hathaway Inc.", "Realty Income Corporation", "The Walt Disney Company", "Lockheed Martin Corporation", "The Coca-Cola Company", "The Boeing Company", "Walmart Inc.", "Palo Alto Networks, Inc.", "Energy Transfer LP", "International Business Machines Corporation", "Bank of America Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [1.32, -0.24, 0.53, 0.05, 0.83, 0.84, 0.43, 0.84, 1.58, -0.47, 2.06, 0.22],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
