<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Gold.com, Inc.", "Marvell Technology, Inc.", "NextEra Energy, Inc.", "Ford Motor Company", "Lockheed Martin Corporation", "Salesforce, Inc.", "Trump Media \u0026 Technology Group Corp.", "Johnson \u0026 Johnson", "Realty Income Corporation", "The Coca-Cola Company", "GE Aerospace", "The Walt Disney Company", "Vertiv Holdings Co"],
                datasets: [{
                    label: '% Change',
                    data: [-3.89, -1.81, -3.15, -1.03, -1.58, 0.2, -0.92, -0.94, -2.7, -1.06, -1.65, 0.31, -4.94],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
