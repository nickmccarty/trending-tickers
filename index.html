<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["STMicroelectronics N.V.", "Verizon Communications Inc.", "The Boeing Company", "Pfizer Inc.", "ASML Holding N.V.", "Cerebras Systems Inc.", "SoundHound AI, Inc.", "NIKE, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-9.75, 1.11, -0.91, 1.36, -6.59, -6.68, -7.74, -1.47],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
