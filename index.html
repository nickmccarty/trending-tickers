<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Gold.com, Inc.", "Marvell Technology, Inc.", "NextEra Energy, Inc.", "Altria Group, Inc.", "Realty Income Corporation", "Ford Motor Company", "Credo Technology Group Holding Ltd", "Energy Fuels Inc.", "The Walt Disney Company", "Uber Technologies, Inc.", "Lockheed Martin Corporation", "Trump Media \u0026 Technology Group Corp."],
                datasets: [{
                    label: '% Change',
                    data: [-3.89, -1.81, -3.15, -0.92, -2.7, -1.03, -3.45, -6.53, 0.31, -1.92, -1.58, -0.92],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
