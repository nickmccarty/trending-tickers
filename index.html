<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>

                datasets: [{
                    label: '% Change',
                    data: [2.5, 6.74, 9.35, 1.28, 4.65, 6.51, -0.73, -1.24, 0.93, 20.34, 2.4, -0.06, 1.19],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true

        });
    </script>
</body>
</html>
