<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Berkshire Hathaway Inc.", "Alphabet Inc.", "Eli Lilly and Company", "Apple Inc.", "The Boeing Company", "SoFi Technologies, Inc.", "Pfizer Inc.", "Microsoft Corporation", "Netflix, Inc.", "Alibaba Group Holding Limited"],
                datasets: [{
                    label: '% Change',
                    data: [-0.24, -0.15, -1.98, 0.11, 0.43, 1.41, -0.81, 1.11, 3.25, -1.36],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
