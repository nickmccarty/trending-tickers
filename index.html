<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["EQT Corporation", "MDA Space Ltd.", "BlackBerry Limited", "Realty Income Corporation", "The Walt Disney Company", "Uber Technologies, Inc.", "MercadoLibre, Inc.", "Joby Aviation, Inc.", "Chevron Corporation", "Archer Aviation Inc.", "International Business Machines Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [0.25, 2.79, 0.31, 3.27, 3.96, 2.44, 1.22, -3.96, 2.12, 1.22, 1.14],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
