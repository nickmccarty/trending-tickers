<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>

<body>

                datasets: [{
                    label: '% Change',
                    data: [NaN, -13.25, -2.45, -13.73, -12.76, NaN, -7.41, -11.12, -7.15, -8.01, -12.15, -12.14],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
