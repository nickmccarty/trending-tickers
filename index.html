<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Lockheed Martin Corporation", "Berkshire Hathaway Inc.", "PayPal Holdings, Inc.", "Arista Networks, Inc.", "The Coca-Cola Company", "ASML Holding N.V.", "NIKE, Inc.", "The Boeing Company"],
                datasets: [{
                    label: '% Change',
                    data: [-3.08, -0.26, 1.47, 2.53, 0.46, 2.81, -0.2, -0.73],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
