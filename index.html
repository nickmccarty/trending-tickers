<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>

<body>

            data: {
                labels: ["Digital Realty Trust, Inc.", "Trump Media \u0026 Technology Group Corp.", "Chevron Corporation", "TMC the metals company Inc.", "Exxon Mobil Corporation", "Occidental Petroleum Corporation", "Altria Group, Inc.", "Devon Energy Corporation", "Venture Global, Inc.", "Enterprise Products Partners L.P.", "Lockheed Martin Corporation", "QuantumScape Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [0.38, 1.4, -0.95, -1.81, -1.63, -0.96, -0.12, -0.19, -0.15, -0.45, -1.63, 2.91],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
