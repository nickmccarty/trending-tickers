<!DOCTYPE html>
<html>
<head>

                datasets: [{
                    label: '% Change',
                    data: [-9.75, 0.92, 1.36, -1.65, 1.82, -15.99, NaN, -2.58, 0.37, -3.69, -6.68, -9.59, -2.71],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
