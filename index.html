<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Virgin Galactic Holdings, Inc.", "SoundHound AI, Inc.", "Visa Inc.", "IREN Limited", "Nebius Group N.V.", "Ondas Inc.", "Realty Income Corporation", "The Boeing Company", "Robinhood Markets, Inc.", "Palantir Technologies Inc."],
                datasets: [{
                    label: '% Change',
                    data: [2.5, 1.5, 0.77, 1.99, 6.74, 8.97, 0.53, 0.43, -1.73, 1.34],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
