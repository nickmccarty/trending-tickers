<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Visa Inc.", "ServiceNow, Inc.", "Shopify Inc.", "IREN Limited", "Navitas Semiconductor Corporation", "Allbirds, Inc.", "Sandisk Corporation", "Berkshire Hathaway Inc.", "Applied Optoelectronics, Inc.", "Novo Nordisk A/S", "Walmart Inc.", "Palantir Technologies Inc.", "D-Wave Quantum Inc."],
                datasets: [{
                    label: '% Change',
                    data: [0.61, 0.23, 3.32, 0.88, -0.4, -1.01, 0.17, -0.11, 1.33, -1.0, 2.15, 2.54, 0.79],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
