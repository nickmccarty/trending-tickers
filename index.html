<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Virgin Galactic Holdings, Inc.", "The Coca-Cola Company", "QuantumScape Corporation", "Planet Labs PBC", "Plug Power Inc.", "Vertiv Holdings Co", "NVIDIA Corporation", "Delta Air Lines, Inc.", "American Airlines Group Inc.", "GE Vernova Inc.", "Broadcom Inc."],
                datasets: [{
                    label: '% Change',
                    data: [2.5, 0.84, 2.42, 16.83, 7.11, 0.74, 0.93, -1.24, -2.61, 0.42, 0.34],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
