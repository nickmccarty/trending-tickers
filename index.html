<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Applied Optoelectronics, Inc.", "NVIDIA Corporation", "CrowdStrike Holdings, Inc.", "Sandisk Corporation", "Marvell Technology, Inc.", "Vertiv Holdings Co", "Broadcom Inc.", "Oracle Corporation", "Lumentum Holdings Inc.", "Applied Materials, Inc.", "Oklo Inc.", "Arm Holdings plc"],
                datasets: [{
                    label: '% Change',
                    data: [-12.99, -1.39, 0.41, -14.13, -9.84, -3.5, -2.41, -1.56, -9.09, -7.35, -0.17, -6.58],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
