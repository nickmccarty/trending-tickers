<!DOCTYPE html>
<html>
<head>

                datasets: [{
                    label: '% Change',
                    data: [4.1, -1.18, -1.76, -1.09, 1.27, 0.37, 17.68, -6.99, 1.16, 2.9, -3.24, -5.27],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true

                }
            }

</body>
</html>
