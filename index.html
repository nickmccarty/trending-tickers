<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["The Coca-Cola Company", "NIKE, Inc.", "Realty Income Corporation", "Rivian Automotive, Inc.", "Chevron Corporation", "Lightwave Logic, Inc.", "The Boeing Company", "Bank of America Corporation", "Exxon Mobil Corporation", "Occidental Petroleum Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [-0.91, -3.14, 0.87, 1.25, -0.95, 25.59, -1.1, -0.32, -1.63, -0.96],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
