<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Lockheed Martin Corporation", "Trump Media \u0026 Technology Group Corp.", "Vistra Corp.", "The Walt Disney Company", "The Coca-Cola Company", "PayPal Holdings, Inc.", "Strategy Inc", "Chevron Corporation", "Coherent Corp.", "Adobe Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-3.08, 1.96, 4.78, -1.01, 0.46, 1.47, -0.84, -1.27, -0.47, 2.7],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
