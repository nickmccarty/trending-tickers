<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Berkshire Hathaway Inc.", "The Coca-Cola Company", "The Walt Disney Company", "QUALCOMM Incorporated", "Apple Inc.", "GE Vernova Inc.", "ASML Holding N.V.", "Alibaba Group Holding Limited", "ImmunityBio, Inc.", "Nebius Group N.V."],
                datasets: [{
                    label: '% Change',
                    data: [-1.43, 1.37, -2.46, -2.63, -1.62, -2.29, -2.03, -2.17, NaN, -4.86],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
