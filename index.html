<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["The Coca-Cola Company", "Realty Income Corporation", "Exxon Mobil Corporation", "The Boeing Company", "Rivian Automotive, Inc.", "Chevron Corporation", "NIKE, Inc.", "Arm Holdings plc", "Visa Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-0.91, 0.87, -1.63, -1.1, 1.25, -0.95, -3.14, -0.58, -1.27],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
