<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Gold.com, Inc.", "Marvell Technology, Inc.", "The Walt Disney Company", "Federal National Mortgage Association", "Trump Media \u0026 Technology Group Corp.", "The Coca-Cola Company", "Lockheed Martin Corporation"],
                datasets: [{
                    label: '% Change',
                    data: [-3.89, -1.81, 0.31, 14.47, -0.92, -1.06, -1.58],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
