<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["SharonAI Holdings Inc.", "GE Vernova Inc.", "The Boeing Company", "The Coca-Cola Company", "Super Micro Computer, Inc.", "Coinbase Global, Inc.", "Ondas Inc."],
                datasets: [{
                    label: '% Change',
                    data: [1.58, -3.71, -0.4, 2.75, -3.31, 4.59, 2.02],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
