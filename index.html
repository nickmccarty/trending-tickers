<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Lockheed Martin Corporation", "Berkshire Hathaway Inc.", "Visa Inc.", "NIKE, Inc.", "Walmart Inc.", "Arista Networks, Inc.", "Strategy Inc", "The Coca-Cola Company", "GE Vernova Inc.", "ASML Holding N.V.", "Lumentum Holdings Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-3.08, -0.26, 0.17, -0.2, -1.6, 2.53, -0.84, 0.46, -0.03, 2.81, 4.1],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
