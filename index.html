<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Applied Optoelectronics, Inc.", "Salesforce, Inc.", "ExxonMobil Holdings Corporation", "Eli Lilly and Company", "Coinbase Global, Inc.", "Oracle Corporation", "NVIDIA Corporation", "Palantir Technologies Inc.", "NIO Inc.", "Verizon Communications Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-12.99, 1.76, 0.59, 1.86, 3.92, -1.56, -1.39, 2.84, -3.62, 1.36],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
