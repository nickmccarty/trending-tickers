<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["STMicroelectronics N.V.", "Pfizer Inc.", "The Boeing Company", "Eli Lilly and Company", "Salesforce, Inc.", "SK hynix Inc.", "Verizon Communications Inc.", "SoundHound AI, Inc.", "Arista Networks, Inc.", "Coherent Corp.", "Tema Space Innovators ETF"],
                datasets: [{
                    label: '% Change',
                    data: [-9.75, 1.36, -0.91, 0.55, -1.64, NaN, 1.11, -7.74, -7.07, -10.64, -9.48],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
