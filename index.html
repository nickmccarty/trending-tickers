<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Sivers Semiconductors AB (publ)", "The Boeing Company", "Lam Research Corporation", "Tema Space Innovators ETF", "Sivers Semiconductors AB (publ)", "Coherent Corp.", "Robinhood Markets, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [17.78, -0.27, 1.03, 6.13, 23.45, -0.11, -3.0],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
