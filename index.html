<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["SoundHound AI, Inc.", "Realty Income Corporation", "Rocket Lab Corporation", "Intel Corporation", "Uber Technologies, Inc.", "Vertiv Holdings Co", "ImmunityBio, Inc.", "UnitedHealth Group Incorporated", "Alibaba Group Holding Limited", "Bitmine Immersion Technologies, Inc."],
                datasets: [{
                    label: '% Change',
                    data: [1.5, 0.53, 3.37, 4.89, 0.18, 0.74, 2.24, 1.2, -1.36, -1.22],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
