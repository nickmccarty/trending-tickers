<!DOCTYPE html>
<html>
<head>
    <title>Trending Tickers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Trending Tickers</h1>
    <canvas id="myChart"></canvas>

    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Momentus Inc.", "KIOXIA HOLDINGS CORPORATION", "Futu Holdings Limited", "Taiwan Semiconductor Manufacturing Company Limited", "Redwire Corporation", "BlackBerry Limited", "Planet Labs PBC", "Tema Space Innovators ETF", "Dell Technologies Inc."],
                datasets: [{
                    label: '% Change',
                    data: [-2.25, NaN, -27.53, 2.22, 13.94, 18.95, 4.4, 6.13, 16.77],
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
